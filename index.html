<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Green Living Challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .draggable { cursor: grab; padding: 10px 20px; background: #3b82f6; color: white; border-radius: 9999px; margin: 5px; display: inline-block; }
        .drop-zone { border: 3px dashed #3b82f6; border-radius: 10px; min-height: 300px; display: flex; align-items: center; justify-content: center; background: #f8fafc; }
    </style>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-6 text-green-700">Green Living Challenge</h1>
        
        <div class="flex flex-wrap justify-center gap-3 mb-8 bg-white p-6 rounded-xl shadow-md">
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w1">Ride a bike</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w2">Carry a reusable bag</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w3">Plan your meals</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w4">Recycle glass bottles and cans</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w5">Hang your clothes to dry</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w6">Plant trees</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w7">Plant flowers</div>
            <div draggable="true" class="draggable" ondragstart="drag(event)" id="w8">Go to neighborhood meetings</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
                <img src="anh1.jpg" alt="Ảnh 1" class="max-h-96" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <p class="hidden text-gray-400">Vui lòng tải ảnh "anh1.jpg" vào thư mục</p>
            </div>
            <div class="drop-zone" ondrop="drop(event)" ondragover="allowDrop(event)">
                <img src="anh2.jpg" alt="Ảnh 2" class="max-h-96" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <p class="hidden text-gray-400">Vui lòng tải ảnh "anh2.jpg" vào thư mục</p>
            </div>
        </div>
    </div>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const draggedElement = document.getElementById(data);
            ev.target.closest('.drop-zone').appendChild(draggedElement);
            alert("Đã di chuyển thành công!");
        }
    </script>
</body>
</html>
